llm:
  domain_description: >
    general signal processing and time-series analysis, including digital and statistical signal processing,
    stochastic processes, spectral estimation, time–frequency and time–scale methods (Fourier, STFT, wavelets,
    multiresolution, Hilbert transforms), filter design (FIR/IIR), adaptive filtering (Wiener, Kalman, particle filters),
    multirate processing, filter banks and subband coding, compressive sensing and sparse representations, deconvolution
    and inverse problems with variational and regularized approaches (L1, total variation, Bayesian methods).
    The domain also covers array and sensor processing (array processing, DOA, MUSIC/ESPRIT, MIMO, source separation,
    BSS/ICA/NMF), as well as application-driven signal processing for audio, speech, biomedical signals, radar/sonar,
    communications, structural health monitoring and sensor networks. It includes modern topics such as graph signal
    processing (signals on graphs, graph filters, graph Fourier transforms) and machine learning for signals: deep neural
    networks (CNN, RNN/LSTM/GRU, TCN, transformers, GNNs), self-supervised and contrastive learning, representation
    learning and model-based or physics-informed deep learning for denoising, detection, classification and forecasting
    of signals. Finally, it encompasses interpretability and explainable AI techniques applied to signal models
    (XAI, saliency, Grad-CAM, SHAP, latent space analysis, representation geometry).
  relevance_threshold: 0.75
  model_name: "all-MiniLM-L12-v2"


