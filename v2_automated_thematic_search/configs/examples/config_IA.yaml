llm:
  domain_description: >
    General artificial intelligence, machine learning and deep learning, with a focus on new models, architectures and
    training practices (transformers, diffusion models, foundation models, large language models, multimodal and
    vision-language models, graph neural networks, mixture-of-experts, state-space models, parameter-efficient
    fine-tuning, LoRA, adapters, instruction tuning, in-context learning, chain-of-thought, RAG and tool-augmented
    LLMs). The domain also covers the analysis and evaluation of these models (scaling laws, benchmarks, robustness,
    hallucinations, out-of-distribution generalization), interpretability and explainable AI (mechanistic
    interpretability, attribution methods, representation geometry), as well as safety, alignment, fairness,
    governance and societal impact of AI systems. A significant part of the domain is devoted to agentic approaches
    (LLM-based agents, tool-using agents, multi-agent systems, planner–executor architectures, AI copilots) and to
    shifts in practices, workflows and methodologies enabled by modern AI systems. Highly domain-specific applications
    (e.g. medical diagnosis, fault diagnosis, stock prediction) without methodological innovation in AI are considered
    out of scope.
  relevance_threshold: 0.75
  model_name: "all-MiniLM-L12-v2"


