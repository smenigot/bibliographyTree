llm:
  domain_description: >
    Optical instrumentation for measuring displacement, velocity, acceleration, strain/stress and tilt using
    interferometry (Michelson, Fabry–Perot, heterodyne/homodyne, self-mixing), fiber-optic sensors (FBG, Rayleigh/
    Brillouin/Raman scattering, DAS/DTS, OFDR, phi-OTDR), optical inertial sensors, and laser-based metrology systems.
    The domain covers instrumentation design, laser stabilization, interrogation techniques, closed-loop control of
    optical systems, temperature and alignment stabilization, as well as advanced signal processing for interferometric
    demodulation (phase retrieval, quadrature demodulation, heterodyne detection, fringe analysis, Kalman filtering,
    inverse problems, model-based estimation). Applications include geosciences and planetary exploration: optical
    seismometry, volcanic monitoring, geophysical deformation measurement, tectonic strain, planetary seismometers
    and in-situ optical instrumentation for planetary missions. Modern approaches involving machine learning, deep
    learning, self-supervised and physics-informed models for optical signal reconstruction, denoising and feature
    extraction are also included.
  relevance_threshold: 0.75
  model_name: "all-MiniLM-L12-v2"


